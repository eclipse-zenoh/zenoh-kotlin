name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ["${{ matrix.os }}"]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out zenoh-kotlin
        uses: actions/checkout@v4
        with:
          path: zenoh-kotlin

      - name: Check out zenoh-flat-jni
        uses: actions/checkout@v4
        with:
          repository: ZettaScaleLabs/zenoh-flat-jni
          ref: 9503f73994c85850354684c0ea9867c5ac93d454
          path: zenoh-flat-jni

      - name: Check out zenoh-flat
        uses: actions/checkout@v4
        with:
          repository: ZettaScaleLabs/zenoh-flat
          ref: 1ece3df5e64db63f980a43e8ae661bdd5ed760c2
          path: zenoh-flat

      - name: Use prebindgen from GitHub main
        shell: bash
        working-directory: zenoh-flat-jni
        run: |
          sed -i.bak \
            -e 's|prebindgen = { path = "../prebindgen/prebindgen" }|prebindgen = { git = "https://github.com/milyin/prebindgen.git", branch = "main" }|g' \
            -e 's|prebindgen-proc-macro = { path = "../prebindgen/prebindgen-proc-macro",|prebindgen-proc-macro = { git = "https://github.com/milyin/prebindgen.git", branch = "main",|g' \
            Cargo.toml ../zenoh-flat/Cargo.toml
          rm Cargo.toml.bak ../zenoh-flat/Cargo.toml.bak

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Install Rust toolchain
        run: |
          rustup show
          rustup component add rustfmt clippy --toolchain 1.93.0

      - name: Build zenoh-flat-jni
        working-directory: zenoh-flat-jni
        run: cargo build

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.12.1

      - name: Gradle Test
        working-directory: zenoh-kotlin
        run: gradle jvmTest --info

  markdown_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          config: '.markdownlint.yaml'
          globs: '**/README.md'

  # NOTE: In GitHub repository settings, the "Require status checks to pass
  # before merging" branch protection rule ensures that commits are only merged
  # from branches where specific status checks have passed. These checks are
  # specified manually as a list of workflow job names. Thus we use this extra
  # job to signal whether all CI checks have passed.
  ci:
    name: CI status checks
    runs-on: ubuntu-latest
    needs: [build, markdown_lint]
    if: always()
    steps:
      - name: Check whether all jobs pass
        run: echo '${{ toJson(needs) }}' | jq -e 'all(.result == "success")'

  # Publish snapshot packages. These jobs will only be triggered when the CI is executed on main.
  publish_jvm_snapshot_package:
    name: Publish JVM snapshot package
    if: contains(fromJSON('["refs/heads/main"]'), github.ref)
    needs: ci
    uses: ./.github/workflows/publish-jvm.yml
    permissions:
      contents: read
      packages: write
    with:
      snapshot: true
      branch: ${{ github.ref_name }}
    secrets: inherit

  publish_android_snapshot_package:
    name: Publish Android snapshot package
    if: contains(fromJSON('["refs/heads/main"]'), github.ref)
    needs: ci
    uses: ./.github/workflows/publish-android.yml
    permissions:
      contents: read
      packages: write
    with:
      snapshot: true
      branch: ${{ github.ref_name }}
    secrets: inherit
